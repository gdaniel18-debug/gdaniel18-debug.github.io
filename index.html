<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>AgroTech Brasil</title>

  <!-- 🟨 CSS (ESTILO) -->
  <style>
    body{
      font-family: Arial;
      text-align: center;
      background: #f4f4f4;
      margin: 0;
      padding: 50px;
    }

    h1{
      color: green;
      font-size: 50px;
    }

    p{
      font-size: 20px;
    }

    button{
      background: green;
      color: white;
      padding: 15px 30px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      margin-top: 20px;
    }

    button:hover{
      background: darkgreen;
    }

    .card{
      background: white;
      padding: 30px;
      margin-top: 40px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

  <!-- 🟦 HTML (ESTRUTURA) -->
  <h1>🌱 AgroTech Brasil</h1>

  <p>Bem-vindo ao site do agronegócio moderno</p>

  <button id="botao">Clique aqui 🌱</button>

  <div class="card">
    <h2>🚜 Agricultura Inteligente</h2>
    <p>Tecnologia no campo para aumentar a produção.</p>
  </div>

  <div class="card">
    <h2>💧 Irrigação</h2>
    <p>Sistemas modernos para economizar água.</p>
  </div>

  <!-- 🟪 JavaScript (AÇÃO) -->
  <script>
    const botao = document.getElementById("botao");

    botao.addEventListener("click", function(){

      alert("Bem-vindo ao AgroTech Brasil 🌱");

    });
  </script>

</body>
</html>
